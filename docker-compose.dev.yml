services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
      target: builder
    command: sh -c "corepack enable && pnpm start:dev"
    env_file:
      - .env
    environment:
      CI: "true"
    ports:
      - "3000:3000"
    volumes:
      - .:/app
      - /app/node_modules
    depends_on:
      - mongo

  mongo:
    image: mongo:8
    restart: unless-stopped
    ports:
      - "27017:27017"
    volumes:
      - mongo-dev-data:/data/db

volumes:
  mongo-dev-data:
